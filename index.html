<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="stylesheet" href="./assets/css/style.css">

        <script src="./assets/js/jquery.js" type="text/javascript"></script>
        <script src="./assets/js/models.js" type="text/javascript"></script>

        <link rel="icon" href="./assets/img/favicons/favicon-16.png" sizes="16x16">
		<link rel="icon" href="./assets/img/favicons/favicon-32.png" sizes="32x32">
		<link rel="icon" href="./assets/img/favicons/favicon-64.png" sizes="64x64">

        <title>Space Impact</title>
        
    </head>
    <body>
        <div class="section">

            <div class="container">

                <div class="game-stage">
                    <div class="game"></div>

                    <div class="touch-controls" aria-label="Controles touch">
                        <div class="touch-dpad" aria-label="Direcional">
                            <button class="touch-button touch-up" type="button" data-touch-direction="ArrowUp" aria-label="Cima">&uarr;</button>
                            <button class="touch-button touch-left" type="button" data-touch-direction="ArrowLeft" aria-label="Esquerda">&larr;</button>
                            <button class="touch-button touch-right" type="button" data-touch-direction="ArrowRight" aria-label="Direita">&rarr;</button>
                            <button class="touch-button touch-down" type="button" data-touch-direction="ArrowDown" aria-label="Baixo">&darr;</button>
                        </div>

                        <div class="touch-actions" aria-label="Acoes">
                            <button class="touch-button touch-pause" type="button" data-touch-action="pause" aria-label="Iniciar ou pausar">II</button>
                            <button class="touch-button touch-fire" type="button" data-touch-action="fire" aria-label="Atirar">F</button>
                        </div>
                    </div>
                </div>

                <div class="controls-game">
                    <span><span class="control-icon" aria-hidden="true">&uarr;</span> CIMA</span>
                    <span><span class="control-icon" aria-hidden="true">&darr;</span> BAIXO</span>
                    <span><span class="control-icon" aria-hidden="true">&larr;</span> ESQUERDA</span>
                    <span><span class="control-icon" aria-hidden="true">&rarr;</span> DIREITA</span>
                    <span><span class="control-key">F</span> ATIRAR</span>
                    <span><span class="control-key">ESPA&Ccedil;O</span> INICIAR/PAUSAR</span>
                </div>
                
            </div>

        </div>
       
    </body>
</html>
